<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder — Hunt Job</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ================================================ RESET ================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ================================================ APP CHROME ================================================ */
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0c0c1a; min-height: 100vh; color: #fff; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 58px;
  background: #12122a; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; padding: 0 16px; gap: 10px; z-index: 1000;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}
.toolbar-logo { font-weight: 800; font-size: 15px; color: #fff; white-space: nowrap; letter-spacing: -0.3px; }
.toolbar-logo span { color: #4ecca3; }
.toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
#template-btns { display: flex; gap: 5px; flex: 1; overflow-x: auto; padding: 2px 0; min-width: 0; scrollbar-width: none; }
#template-btns::-webkit-scrollbar { display: none; }
.tpl-btn {
  padding: 5px 12px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.12);
  cursor: pointer; font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.55);
  background: transparent; white-space: nowrap; transition: all 0.18s;
}
.tpl-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.tpl-btn.active { color: #4ecca3; border-color: #4ecca3; background: rgba(78,204,163,0.1); }
.toolbar-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.18s; white-space: nowrap; }
.btn-ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
.btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; }
.btn-export { background: #4ecca3; color: #0c0c1a; }
.btn-export:hover { background: #3bb88d; }

#edit-hint {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(12,12,26,0.85); backdrop-filter: blur(8px);
  border: 1px solid rgba(78,204,163,0.25); color: rgba(255,255,255,0.55); font-size: 11px;
  padding: 6px 14px; border-radius: 20px; z-index: 900; pointer-events: none; white-space: nowrap;
}

#app-body { margin-top: 58px; padding: 28px 20px 80px; display: flex; flex-direction: column; align-items: center; }
#resume-wrapper { width: 794px; background: white; box-shadow: 0 12px 80px rgba(0,0,0,0.5); position: relative; }

/* ================================================ EDITABLE ================================================ */
[contenteditable="true"] { outline: none; cursor: text; border-radius: 2px; transition: background 0.15s; display: inline; }
[contenteditable="true"]:hover { background: rgba(78,204,163,0.09); }
[contenteditable="true"]:focus { background: rgba(78,204,163,0.14); box-shadow: 0 0 0 1.5px rgba(78,204,163,0.5); }

/* ================================================ BULLET CONTROLS ================================================ */
.bullet-row { display: flex; align-items: flex-start; gap: 4px; position: relative; }
.bullet-ctrl { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; padding-top: 2px; }
.bullet-row:hover .bullet-ctrl { opacity: 1; }
.del-bullet, .add-bullet-after {
  width: 16px; height: 16px; border-radius: 50%; border: none; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.del-bullet { background: #e74c3c; color: #fff; }
.del-bullet:hover { background: #c0392b; }
.add-bullet-after { background: #4ecca3; color: #0c0c1a; }
.add-bullet-after:hover { background: #3bb88d; }

/* Tag wrap with delete button */
.tag-wrap { position: relative; display: inline-flex; align-items: center; }
.tag-del {
  display: none; position: absolute; top: -5px; right: -5px;
  width: 14px; height: 14px; border-radius: 50%; border: none;
  background: #e74c3c; color: #fff; font-size: 9px; cursor: pointer;
  align-items: center; justify-content: center;
}
.tag-wrap:hover .tag-del { display: flex; }
.add-tag-btn {
  border: 1px dashed rgba(78,204,163,0.5); background: transparent; color: #4ecca3;
  border-radius: 12px; font-size: 11px; padding: 2px 8px; cursor: pointer; font-family: inherit;
}
.add-tag-btn:hover { background: rgba(78,204,163,0.1); }

/* ================================================
   TEMPLATE 1: CLASSIC  (dark header, two-column, teal)
   ================================================ */
.resume-classic { font-family: 'Segoe UI', Arial, sans-serif; color: #333; min-height: 1123px; }

.rc-header { background: #1d2b37; padding: 26px 28px 22px; display: flex; justify-content: space-between; align-items: flex-start; }
.rc-header-left { flex: 1; }
.rc-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 3px; line-height: 1.15; display: block; }
.rc-title { font-size: 13px; color: #1abc9c; font-weight: 500; margin-bottom: 10px; display: block; }
.rc-summary { font-size: 11.5px; color: rgba(255,255,255,0.82); line-height: 1.55; max-width: 90%; display: block; }
.rc-photo {
  width: 78px; height: 78px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: rgba(255,255,255,0.4); text-align: center;
  cursor: pointer; overflow: hidden; flex-shrink: 0; margin-left: 20px;
}
.rc-photo img { width: 100%; height: 100%; object-fit: cover; }
.rc-contact { background: #152330; display: flex; flex-wrap: wrap; }
.rc-contact-item { display: flex; align-items: center; gap: 5px; padding: 7px 16px; font-size: 11px; color: #9ec5d0; border-right: 1px solid rgba(255,255,255,0.06); }
.rc-contact-icon { color: #1abc9c; font-size: 11px; flex-shrink: 0; }
.rc-body { display: grid; grid-template-columns: 58% 42%; min-height: 860px; }
.rc-left { padding: 18px 18px 18px 22px; border-right: 1px solid #ebebeb; }
.rc-right { padding: 18px 18px 18px 18px; }
.rc-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #1abc9c; border-bottom: 1.5px solid #1abc9c; padding-bottom: 4px; margin-bottom: 11px; margin-top: 16px; }
.rc-left .rc-section-title:first-child, .rc-right .rc-section-title:first-child { margin-top: 0; }
.rc-exp-title { font-size: 13px; font-weight: 700; color: #1d2b37; display: block; }
.rc-exp-company-line { font-size: 11.5px; font-weight: 600; color: #333; margin-bottom: 2px; }
.rc-exp-period { font-size: 10.5px; color: #1abc9c; font-style: italic; margin: 2px 0 3px; display: block; }
.rc-exp-desc { font-size: 11px; color: #666; font-style: italic; margin-bottom: 5px; line-height: 1.4; display: block; }
.rc-exp-tag { font-size: 10px; color: #1abc9c; font-weight: 600; margin-bottom: 4px; }
.rc-exp-block { margin-bottom: 14px; }
/* Bullet rows for classic — dot is a separate non-editable element */
.rc-bullet-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
.rc-bullet-row:hover .bullet-ctrl { opacity: 1; }
.rc-bullet-dot { width: 6px; height: 6px; background: #1abc9c; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.rc-bullet-text { font-size: 11px; color: #444; line-height: 1.48; flex: 1; }
.rc-skill-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.rc-skill-tag { border: 1px solid #1abc9c; color: #1d6f68; font-size: 10.5px; padding: 3px 9px; border-radius: 12px; background: transparent; }
.rc-edu-item { margin-bottom: 10px; }
.rc-edu-degree { font-size: 12px; font-weight: 700; color: #1d2b37; display: block; }
.rc-edu-inst { font-size: 11px; color: #444; display: block; }
.rc-edu-period { font-size: 10.5px; color: #1abc9c; font-style: italic; display: block; }
.rc-cert-name { font-size: 12px; font-weight: 600; color: #1d2b37; display: block; }
.rc-cert-period { font-size: 10.5px; color: #777; display: block; }
.rc-cert-desc { font-size: 10.5px; color: #888; font-style: italic; display: block; }
.rc-lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.rc-lang-name { font-size: 12px; font-weight: 600; color: #1d2b37; display: block; }
.rc-lang-level { font-size: 10.5px; color: #1abc9c; font-style: italic; display: block; }
.rc-interest-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.rc-interest-tag { background: #f0faf8; border: 1px solid #c5e8e2; color: #1d6f68; font-size: 10.5px; padding: 3px 9px; border-radius: 12px; }
.rc-prev-exp-item { margin-bottom: 13px; }
.rc-prev-exp-company { font-size: 11px; color: #555; }
.rc-prev-exp-period { font-size: 10.5px; color: #1abc9c; font-style: italic; margin: 2px 0 3px; display: block; }

/* ================================================
   TEMPLATE 2: MINIMALIST PRO  (clean white, lots of space)
   ================================================ */
.resume-minimalist { font-family: 'Inter', 'Segoe UI', sans-serif; color: #1a1a1a; min-height: 1123px; padding: 44px 46px; }
.rm-name { font-size: 30px; font-weight: 800; color: #111; letter-spacing: -0.5px; margin-bottom: 3px; display: block; }
.rm-title { font-size: 13px; color: #555; font-weight: 500; margin-bottom: 10px; display: block; }
.rm-contact { display: flex; flex-wrap: wrap; gap: 14px; font-size: 11.5px; color: #555; margin-bottom: 14px; }
.rm-contact-item { display: flex; align-items: center; gap: 4px; }
.rm-summary { font-size: 12px; color: #444; line-height: 1.65; border-left: 3px solid #4ecca3; padding-left: 12px; margin-bottom: 22px; display: block; }
.rm-divider { height: 1px; background: #eee; margin-bottom: 20px; }
.rm-body { display: grid; grid-template-columns: 62% 38%; gap: 28px; }
.rm-section-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #4ecca3; margin-bottom: 12px; }
.rm-exp-title { font-size: 13px; font-weight: 700; color: #111; display: block; }
.rm-exp-company-line { font-size: 11.5px; color: #555; margin-bottom: 2px; }
.rm-exp-period { font-size: 10.5px; color: #888; margin: 2px 0 6px; display: block; }
.rm-exp-block { margin-bottom: 16px; }
/* Minimalist bullet: dash is a CSS ::before, NOT in editable text */
.rm-bullet-row { display: flex; align-items: flex-start; gap: 4px; margin-bottom: 3px; }
.rm-bullet-dash { font-size: 11px; color: #4ecca3; flex-shrink: 0; line-height: 1.5; margin-top: 1px; user-select: none; }
.rm-bullet-text { font-size: 11.5px; color: #333; line-height: 1.55; flex: 1; }
.rm-skill-list { display: flex; flex-wrap: wrap; gap: 5px; }
.rm-skill-chip { background: #f4f4f4; color: #333; font-size: 10.5px; padding: 3px 9px; border-radius: 4px; }
.rm-edu-item { margin-bottom: 11px; }
.rm-edu-degree { font-size: 12.5px; font-weight: 600; display: block; }
.rm-edu-inst { font-size: 11px; color: #666; display: block; }
.rm-edu-period { font-size: 10.5px; color: #888; display: block; }
.rm-cert-name { font-size: 12px; font-weight: 600; display: block; }
.rm-cert-sub { font-size: 10.5px; color: #888; display: block; }
.rm-lang-item { margin-bottom: 7px; }
.rm-lang-name { font-size: 12px; font-weight: 600; display: block; }
.rm-lang-level { font-size: 10.5px; color: #888; display: block; }
.rm-tag { display: inline-block; background: #f0fdf9; color: #1d6f68; border: 1px solid #b2e2d6; font-size: 10.5px; padding: 2px 8px; border-radius: 3px; margin: 2px 2px 0 0; }

/* ================================================
   TEMPLATE 3: AZURE SIDEBAR  (dark left panel)
   ================================================ */
.resume-sidebar { font-family: 'Inter', 'Segoe UI', sans-serif; display: flex; min-height: 1123px; }
.rs-sidebar { width: 30%; background: #1a3a5c; color: #fff; padding: 30px 18px; display: flex; flex-direction: column; gap: 0; }
.rs-main { flex: 1; background: #fff; color: #1a1a1a; padding: 30px 22px; }
.rs-photo-area {
  width: 88px; height: 88px; border-radius: 50%; background: rgba(255,255,255,0.12);
  border: 3px solid rgba(255,255,255,0.25); margin: 0 auto 14px; display: flex;
  align-items: center; justify-content: center; font-size: 9px; color: rgba(255,255,255,0.5);
  cursor: pointer; overflow: hidden;
}
.rs-photo-area img { width: 100%; height: 100%; object-fit: cover; }
.rs-sb-name { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 3px; display: block; }
.rs-sb-title { font-size: 9.5px; color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 18px; display: block; }
.rs-sb-section { margin-bottom: 16px; }
.rs-sb-label { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: #4ecca3; margin-bottom: 7px; border-bottom: 1px solid rgba(78,204,163,0.3); padding-bottom: 3px; }
.rs-sb-contact-item { display: flex; align-items: flex-start; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.78); margin-bottom: 5px; line-height: 1.35; }
.rs-sb-contact-icon { color: #4ecca3; flex-shrink: 0; margin-top: 1px; }
.rs-sb-skill-tag { display: inline-block; background: rgba(255,255,255,0.1); border: 1px solid rgba(78,204,163,0.4); color: rgba(255,255,255,0.88); font-size: 9.5px; padding: 2px 7px; border-radius: 10px; margin: 2px 2px 0 0; }
.rs-sb-lang-item { margin-bottom: 6px; }
.rs-sb-lang-name { font-size: 11.5px; font-weight: 600; display: block; }
.rs-sb-lang-level { font-size: 9.5px; color: rgba(255,255,255,0.62); display: block; }
.rs-sb-interest-tag { display: inline-block; font-size: 9.5px; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.07); border-radius: 3px; padding: 2px 6px; margin: 2px 2px 0 0; }
.rs-main-name { font-size: 24px; font-weight: 800; color: #1a3a5c; margin-bottom: 2px; display: block; }
.rs-main-title { font-size: 12px; color: #4ecca3; font-weight: 600; margin-bottom: 10px; display: block; }
.rs-main-summary { font-size: 11.5px; color: #555; line-height: 1.6; border-bottom: 1px solid #eee; padding-bottom: 14px; margin-bottom: 14px; display: block; }
.rs-section-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: #1a3a5c; border-left: 3px solid #4ecca3; padding-left: 8px; margin-bottom: 11px; margin-top: 16px; }
.rs-section-title:first-child { margin-top: 0; }
.rs-exp-title { font-size: 13px; font-weight: 700; color: #1a3a5c; display: block; }
.rs-exp-company-line { font-size: 11px; color: #444; margin-bottom: 1px; }
.rs-exp-period { font-size: 10.5px; color: #4ecca3; margin: 2px 0 5px; display: block; }
.rs-exp-desc { font-size: 11px; color: #666; font-style: italic; margin-bottom: 5px; display: block; }
.rs-exp-block { margin-bottom: 15px; }
/* Sidebar bullet: marker is separate span, NOT inside editable */
.rs-bullet-row { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; }
.rs-bullet-row:hover .bullet-ctrl { opacity: 1; }
.rs-bullet-mark { color: #4ecca3; font-weight: 700; flex-shrink: 0; margin-top: 1px; font-size: 12px; user-select: none; }
.rs-bullet-text { font-size: 11px; color: #444; line-height: 1.48; flex: 1; }
.rs-edu-item { margin-bottom: 10px; }
.rs-edu-degree { font-size: 12px; font-weight: 600; color: #1a3a5c; display: block; }
.rs-edu-inst { font-size: 10.5px; color: #555; display: block; }
.rs-edu-period { font-size: 10.5px; color: #888; display: block; }

/* ================================================
   TEMPLATE 4: EXECUTIVE  (traditional, centered header, serif)
   ================================================ */
.resume-executive { font-family: 'Georgia', 'Times New Roman', serif; color: #1a1a2e; min-height: 1123px; }
.re-header { text-align: center; padding: 30px 36px 18px; border-bottom: 3px solid #1a1a6e; }
.re-name { font-size: 28px; font-weight: 700; color: #1a1a6e; letter-spacing: 1px; margin-bottom: 5px; display: block; }
.re-title { font-size: 13.5px; color: #555; margin-bottom: 12px; font-style: italic; display: block; }
.re-contact { display: flex; justify-content: center; flex-wrap: wrap; gap: 14px; font-size: 11.5px; color: #444; }
.re-contact-item { display: flex; align-items: center; gap: 4px; }
.re-summary { font-size: 11.5px; color: #333; line-height: 1.65; text-align: center; max-width: 680px; margin: 12px auto 0; display: block; }
.re-body { display: grid; grid-template-columns: 55% 45%; }
.re-left { padding: 18px 18px 22px 26px; border-right: 1px solid #d8d8e8; }
.re-right { padding: 18px 22px 22px 18px; }
.re-section-title { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #1a1a6e; border-bottom: 2px solid #1a1a6e; padding-bottom: 4px; margin-bottom: 11px; margin-top: 16px; font-family: 'Inter', sans-serif; }
.re-left .re-section-title:first-child, .re-right .re-section-title:first-child { margin-top: 0; }
.re-exp-title { font-size: 13px; font-weight: 700; color: #1a1a2e; display: block; }
.re-exp-company-line { font-size: 11.5px; font-style: italic; color: #1a1a6e; font-weight: 600; }
.re-exp-period { font-size: 10.5px; color: #888; margin: 2px 0 5px; display: block; }
.re-exp-desc { font-size: 11px; color: #555; font-style: italic; margin-bottom: 5px; line-height: 1.4; display: block; }
.re-exp-block { margin-bottom: 14px; }
/* Executive bullet: diamond is a separate non-editable span */
.re-bullet-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 3px; }

.re-bullet-mark { color: #1a1a6e; flex-shrink: 0; font-size: 9px; margin-top: 4px; user-select: none; }

.re-skill-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 5px; }

.re-skill-text { font-size: 11.5px; color: #333; line-height: 1.4; }
.re-edu-item { margin-bottom: 11px; }
.re-edu-degree { font-size: 12.5px; font-weight: 700; display: block; }
.re-edu-inst { font-size: 11.5px; color: #555; font-style: italic; display: block; }
.re-edu-period { font-size: 10.5px; color: #888; display: block; }
.re-cert-name { font-size: 12px; font-weight: 600; display: block; }
.re-cert-sub { font-size: 10.5px; color: #888; font-style: italic; display: block; }

/* ================================================
   TEMPLATE 5: BOLD IMPACT  (gradient header, cards)
   ================================================ */
.resume-bold { font-family: 'Inter', 'Segoe UI', sans-serif; min-height: 1123px; background: #fff; }
.rb-header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 32px 34px 26px; position: relative; overflow: hidden; }
.rb-header::before { content: ''; position: absolute; top: -60px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(78,204,163,0.07); border: 1px solid rgba(78,204,163,0.14); }
.rb-header-inner { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
.rb-name { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1; margin-bottom: 6px; display: block; }
.rb-name-accent { color: #4ecca3; }
.rb-title { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.65); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; }
.rb-summary { font-size: 11px; color: rgba(255,255,255,0.78); line-height: 1.6; max-width: 78%; display: block; }
.rb-photo { width: 78px; height: 78px; border-radius: 12px; border: 2px solid rgba(78,204,163,0.4); background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 9px; color: rgba(255,255,255,0.4); text-align: center; cursor: pointer; overflow: hidden; flex-shrink: 0; }
.rb-photo img { width: 100%; height: 100%; object-fit: cover; }
.rb-contact-bar { background: rgba(0,0,0,0.55); display: flex; position: relative; z-index: 1; margin: 14px -34px -26px; padding: 0 34px; }
.rb-contact-item { display: flex; align-items: center; gap: 5px; padding: 7px 12px; font-size: 10.5px; color: rgba(255,255,255,0.68); border-right: 1px solid rgba(255,255,255,0.06); }
.rb-contact-icon { color: #4ecca3; }
.rb-body { display: grid; grid-template-columns: 58% 42%; }
.rb-left { padding: 20px 18px 20px 22px; border-right: 1px solid #f0f0f0; }
.rb-right { padding: 20px 18px 20px 16px; }

// Returns HTML for a bullet row: controls (hidden) + marker (non-editable) + editable text
// marker = the visual bullet char; markerCls = CSS class for it; textCls = CSS class for text; rowCls = CSS class for row
function mkBullet(ei, bi, text, rowCls, markerCls, markerChar, textCls) {
  return `
<div class="${rowCls}">
  <span class="bullet-ctrl">
    <button class="del-bullet" onclick="deleteBulletById('experience.${ei}.bullets.${bi}')" title="Remove">×</button>
    <button class="add-bullet-after" onclick="addBulletAfter('experience.${ei}.bullets.${bi}')" title="Add below">+</button>
  </span>
  <span class="${markerCls}" aria-hidden="true">${markerChar}</span>
  <span class="${textCls}" contenteditable="true" data-id="experience.${ei}.bullets.${bi}">${text}</span>
</div>`;
}

// Returns HTML for a tag-wrap (skill/interest/etc) with delete button
function tagWrap(text, dataId, tagClass) {
  return `<span class="tag-wrap"><span class="${tagClass}" contenteditable="true" data-id="${dataId}">${text}</span><button class="tag-del" onclick="deleteTagById('${dataId}')" title="Remove">×</button></span>`;
}

// Returns HTML for company + optional location as SEPARATE editable fields

    : '';
  return `<span class="${companyCls}" contenteditable="true" data-id="experience.${ei}.company">${exp.company}</span>${loc}`;
}

// ============================================================
// RENDER DISPATCH
// ============================================================
const renderers = { classic: renderClassic, minimalist: renderMinimalist, sidebar: renderSidebar, executive: renderExecutive, bold: renderBold, ats: renderATS };

// ============================================================
// DATA EXTRACTION — only takes text from data-id elements,
// NEVER nests data-ids so textContent is always just the field value
// ============================================================
function extractEdits() {
  const wrap = document.getElementById('resume-wrapper');
  if (!wrap) return;

  const values = new Map();
  wrap.querySelectorAll('[data-id]').forEach(el => {
    const id = el.dataset.id;
    if (!values.has(id)) values.set(id, el.textContent.trim());
  });

  // Override with last-focused (resolves Sidebar duplicate name/title data-ids)
  lastFocused.forEach((el, id) => {
    if (el.isConnected) values.set(id, el.textContent.trim());
  });

  values.forEach((val, id) => setVal(id, val));
  lastFocused.clear();
}

function setVal(path, val) {
  const parts = path.split('.');
  let obj = D;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    if (obj == null || obj[k] == null) return;
    obj = obj[k];
  }
  const last = parts[parts.length - 1];
  const key = isNaN(last) ? last : parseInt(last);
  obj[key] = val;
}

// ============================================================
// RENDER
// ============================================================
function render(tplId) {
  extractEdits();
  currentTpl = tplId;
  document.getElementById('resume-wrapper').innerHTML = renderers[tplId](D);
  updateToolbar();
  saveToStorage();
}

function updateToolbar() {
  document.querySelectorAll('.tpl-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tpl === currentTpl);
  });
}

// ============================================================
// ADD / DELETE OPERATIONS
// ============================================================
function deleteBulletById(dataId) {
  extractEdits();
  const parts = dataId.split('.');
  const idx = parseInt(parts[parts.length - 1]);
  let arr = D;
  for (const p of parts.slice(0, -1)) arr = arr[isNaN(p) ? p : parseInt(p)];
  if (Array.isArray(arr) && arr.length > 1) { arr.splice(idx, 1); render(currentTpl); }
}

function addBulletAfter(dataId) {
  extractEdits();
  const parts = dataId.split('.');
  const idx = parseInt(parts[parts.length - 1]);
  let arr = D;
  for (const p of parts.slice(0, -1)) arr = arr[isNaN(p) ? p : parseInt(p)];
  if (Array.isArray(arr)) { arr.splice(idx + 1, 0, 'New achievement or responsibility'); render(currentTpl); }
}

function addBulletToExp(expIdx) {
  extractEdits();
  D.experience[expIdx].bullets.push('New achievement or responsibility');
  render(currentTpl);
}

function deleteTagById(dataId) {
  extractEdits();
  const parts = dataId.split('.');
  const idx = parseInt(parts[parts.length - 1]);
  let arr = D;
  for (const p of parts.slice(0, -1)) arr = arr[isNaN(p) ? p : parseInt(p)];
  if (Array.isArray(arr) && arr.length > 1) { arr.splice(idx, 1); render(currentTpl); }
}

function addSkill() { extractEdits(); D.skills.push('New Skill'); render(currentTpl); }
function addInterest() { extractEdits(); D.interests.push('New Interest'); render(currentTpl); }
function addExperience() {
  extractEdits();
  D.experience.push({ title: 'Job Title', company: 'Company Name', location: '', period: 'MM/YYYY – MM/YYYY', desc: '', bullets: ['Key achievement or responsibility'] });
  render(currentTpl);
}

// ============================================================
// PHOTO UPLOAD
// ============================================================
function triggerPhotoUpload() { document.getElementById('photo-input').click(); }

document.getElementById('photo-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { D.photo = ev.target.result; render(currentTpl); };
  reader.readAsDataURL(file);
  this.value = '';
});

// ============================================================
// PDF EXPORT
// ============================================================
function exportPDF() { extractEdits(); window.print(); }

// ============================================================
// PERSISTENCE
// ============================================================
function saveToStorage() {
  try { localStorage.setItem('hj_resume_data', JSON.stringify(D)); localStorage.setItem('hj_resume_tpl', currentTpl); } catch(e) {}
}
function loadFromStorage() {
  try {
    const saved = localStorage.getItem('hj_resume_data');
    if (saved) D = JSON.parse(saved);
    const tpl = localStorage.getItem('hj_resume_tpl');
    if (tpl && renderers[tpl]) currentTpl = tpl;
  } catch(e) {}
}

function resetData() {
  if (!confirm('Reset all edits and reload the original resume data?')) return;
  localStorage.removeItem('hj_resume_data');
  localStorage.removeItem('hj_resume_tpl');
  location.reload();
}

// ============================================================
// INIT
// ============================================================
(function init() {
  // Build template buttons
  const btns = document.getElementById('template-btns');
  TEMPLATES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tpl-btn';
    btn.dataset.tpl = t.id;
    btn.textContent = t.label;
    btn.title = t.desc;
    btn.onclick = () => render(t.id);
    btns.appendChild(btn);
  });

  // Load saved data, then render
  loadFromStorage();
  render(currentTpl);

  // Track last focused element for duplicate data-id resolution (Sidebar template)
  document.getElementById('resume-wrapper').addEventListener('focusin', e => {
    if (e.target && e.target.dataset && e.target.dataset.id) {
      lastFocused.set(e.target.dataset.id, e.target);
    }
  });

  // Auto-save on any blur
  document.getElementById('resume-wrapper').addEventListener('focusout', () => {
    extractEdits();
    saveToStorage();
  });
})();
</script>
</body>
</html>
